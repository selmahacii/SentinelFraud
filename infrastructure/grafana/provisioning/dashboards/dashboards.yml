# =============================================================================
# SENTINEL-FRAUD: Grafana Dashboard Provisioning
# =============================================================================

apiVersion: 1

providers:
  - name: 'Sentinel-Fraud'
    orgId: 1
    folder: 'Sentinel'
    folderUid: 'sentinel'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
