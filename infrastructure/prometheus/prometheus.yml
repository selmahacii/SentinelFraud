# =============================================================================
# SENTINEL-FRAUD: Prometheus Configuration
# =============================================================================
# Comprehensive monitoring configuration for fraud detection service
# =============================================================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sentinel-fraud'
    environment: 'production'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # ===========================================================================
  # Prometheus self-monitoring
  # ===========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scrape_interval: 30s

  # ===========================================================================
  # Sentinel Fraud Inference Service
  # ===========================================================================
  - job_name: 'sentinel-inference'
    static_configs:
      - targets: ['fraud-inference:8000']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'inference-service'

  # ===========================================================================
  # Redis Exporter
  # ===========================================================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /metrics
    scrape_interval: 30s

  # ===========================================================================
  # Kafka JMX Exporter (if enabled)
  # ===========================================================================
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
    metrics_path: /metrics
    scrape_interval: 30s

  # ===========================================================================
  # Node Exporter (system metrics)
  # ===========================================================================
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

  # ===========================================================================
  # cAdvisor (container metrics)
  # ===========================================================================
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
